name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/mpesa-stk-push/**"
      - "supabase/functions/mpesa-callback/**"
      - ".github/workflows/deploy-functions.yml"

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy mpesa-stk-push
        run: |
          npx --yes supabase functions deploy mpesa-stk-push \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt

      - name: Deploy mpesa-callback
        run: |
          npx --yes supabase functions deploy mpesa-callback \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            --no-verify-jwt
