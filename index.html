
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Sella</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'primary': {
                'DEFAULT': '#9D1F15', // Brand Primary
                'dark': '#7A1810',
                'light': '#C43E32'
              },
              'secondary': {
                'DEFAULT': '#F39C2A', // Brand Secondary
                'dark': '#D6861E'
              },
              'light-bg': '#F8F9FA'
            },
            zIndex: {
              'header': '50',
              'sidebar': '40',
              'modal': '100',
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      :root {
        --header-height: 112px; /* 64px top + 48px nav */
        --sidebar-width: 180px;
        --primary-color: #9D1F15;
        --secondary-color: #F39C2A;
        --sidebar-bg: #9D1F15;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #F8F9FA;
        overflow-x: hidden;
      }

      /* --- Layout Engine --- */
      
      .app-layout {
        /* Changed from flex to block to prevent vertical alignment issues */
        display: block;
        min-height: 100vh;
        position: relative;
      }

      /* Header is fixed */
      .app-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: var(--header-height);
        z-index: 50;
      }

      /* Sidebar */
      .app-sidebar {
        position: fixed;
        top: var(--header-height);
        left: 0;
        bottom: 0;
        width: var(--sidebar-width);
        background-color: var(--sidebar-bg);
        z-index: 40;
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        border-right: 1px solid rgba(0,0,0,0.1);
        box-shadow: 4px 0 15px rgba(0,0,0,0.1);
      }

      /* Main Content Area */
      .app-main {
        /* Use padding instead of margin to ensure background continuity and avoid collapse */
        padding-top: calc(var(--header-height) + 1.5rem); 
        padding-left: 1.5rem;
        padding-right: 1.5rem;
        padding-bottom: 1.5rem;
        background-color: #F8F9FA;
        min-height: 100vh;
        transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1), width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        box-sizing: border-box; 
      }

      /* --- Unified Layout Logic (Desktop) --- */
      
      /* Sidebar Open: Push content right and resize */
      [data-sidebar-open="true"] .app-sidebar {
        transform: translateX(0);
      }
      [data-sidebar-open="true"] .app-main {
        margin-left: var(--sidebar-width);
        width: calc(100% - var(--sidebar-width));
      }

      /* Sidebar Closed: Full width content */
      [data-sidebar-open="false"] .app-sidebar {
        transform: translateX(-100%);
      }
      [data-sidebar-open="false"] .app-main {
        margin-left: 0;
        width: 100%;
      }

      /* --- Mobile Responsive Overrides --- */
      @media (max-width: 1024px) {
        .app-sidebar {
            z-index: 60 !important; /* Force above header backdrop */
            box-shadow: 5px 0 25px rgba(0,0,0,0.2);
        }

        /* Glass Backdrop for mobile menu */
        .glass-backdrop {
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }
      }

      /* --- Secondary Colored Scrollbar (Sidebar) --- */
      .sidebar-nav-scroll {
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--secondary-color) transparent;
      }

      .sidebar-nav-scroll::-webkit-scrollbar {
        width: 8px;
      }

      .sidebar-nav-scroll::-webkit-scrollbar-track {
        background: transparent;
      }

      .sidebar-nav-scroll::-webkit-scrollbar-thumb {
        background-color: var(--secondary-color); /* Secondary Color */
        border-radius: 10px;
        border: 2px solid var(--sidebar-bg); /* Creates padding effect against background */
      }

      .sidebar-nav-scroll::-webkit-scrollbar-thumb:hover {
        background-color: #D6861E; /* Secondary Dark */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",

}
</script>
